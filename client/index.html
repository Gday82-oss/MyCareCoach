<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icon-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    
    <!-- PWA Meta Tags — valeurs par défaut (client /client) -->
    <meta name="theme-color" content="#6C5CE7" id="pwa-theme-color" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MyCareCoach Client" id="pwa-app-title" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="MyCareCoach Client" id="pwa-app-name" />
    <meta name="format-detection" content="telephone=no" />

    <!-- PWA Manifest — dynamique selon URL -->
    <link rel="manifest" href="/manifest.json" id="pwa-manifest" />

    <!-- Apple Touch Icons — dynamiques selon URL -->
    <link rel="apple-touch-icon" href="/icons/icon-client-180.png" id="apple-touch-icon-default" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-client-180.png" id="apple-touch-icon-180" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-client-192.png" id="apple-touch-icon-152" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-client-192.png" id="apple-touch-icon-167" />

    <script>
      (function() {
        var path = window.location.pathname;
        if (path.startsWith('/app')) {
          // ── Espace Coach ──
          document.getElementById('pwa-manifest').href    = '/manifest-coach.json';
          document.getElementById('pwa-theme-color').content = '#1A2B4A';
          document.getElementById('pwa-app-title').content   = 'MyCareCoach Coach';
          document.getElementById('pwa-app-name').content    = 'MyCareCoach Coach';
          document.getElementById('apple-touch-icon-default').href = '/icons/icon-180.png';
          document.getElementById('apple-touch-icon-180').href     = '/icons/icon-180.png';
          document.getElementById('apple-touch-icon-152').href     = '/icons/icon-192.png';
          document.getElementById('apple-touch-icon-167').href     = '/icons/icon-192.png';
        }
        // /client/* → valeurs par défaut déjà définies (violet, icônes client)
      })();
    </script>

    <!-- Splash Screens for iOS -->
    <link rel="apple-touch-startup-image" href="/icons/icon-client-512.png" id="splash-screen" />

    <!-- Microsoft -->
    <meta name="msapplication-TileColor" content="#6C5CE7" />
    <meta name="msapplication-TileImage" content="/icons/icon-client-192.png" />

    <!-- SEO -->
    <title>MyCareCoach - Votre compagnon sport-santé</title>
    <meta name="description" content="Suivez vos séances, programmes et progrès avec votre coach personnel. La plateforme sport-santé qui vous accompagne au quotidien." />
    <meta name="keywords" content="sport, santé, coach, fitness, programme, entraînement, suivi" />
    <meta name="author" content="MyCareCoach" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="MyCareCoach - Votre compagnon sport-santé" />
    <meta property="og:description" content="Suivez vos séances, programmes et progrès avec votre coach personnel." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mycarecoach.app" />
    <meta property="og:image" content="https://mycarecoach.app/favicon.svg" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Preload critical assets -->
    <link rel="preload" as="image" href="/icons/icon-client-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
