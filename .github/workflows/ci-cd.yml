name: 🚀 MyCareCoach CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # JOB 1: Build & Type Check
  # ============================================
  build:
    name: 🔨 Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Type check client
        working-directory: ./client
        run: npx tsc --noEmit

      - name: Build client
        working-directory: ./client
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_URL: https://mycarecoach.app/api
        run: npm run build

      - name: Install server dependencies
        working-directory: ./server
        run: npm install

      - name: Build server
        working-directory: ./server
        run: npm run build

      - name: Upload client build
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          retention-days: 1

      - name: Upload server build
        uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: |
            server/dist
            server/package.json
            server/package-lock.json
          retention-days: 1

  # ============================================
  # JOB 2: E2E Tests (on PR only)
  # ============================================
  e2e:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./client
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: ./client
        run: npx playwright test || true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 7

  # ============================================
  # JOB 3: Deploy to VPS (main branch only)
  # ============================================
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download client build
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client-dist

      - name: Download server build
        uses: actions/download-artifact@v4
        with:
          name: server-dist
          path: server-dist

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Package and upload frontend
        run: |
          tar -czf frontend.tar.gz -C client-dist .
          scp frontend.tar.gz root@${{ secrets.VPS_HOST }}:/tmp/

      - name: Package and upload backend
        run: |
          tar -czf backend.tar.gz -C server-dist .
          scp backend.tar.gz root@${{ secrets.VPS_HOST }}:/tmp/

      - name: Deploy on VPS
        run: |
          ssh root@${{ secrets.VPS_HOST }} << 'DEPLOY'
            set -e

            # Deploy frontend
            mkdir -p /var/www/mycarecoach/dist
            rm -rf /var/www/mycarecoach/dist/*
            tar -xzf /tmp/frontend.tar.gz -C /var/www/mycarecoach/dist
            chown -R www-data:www-data /var/www/mycarecoach
            rm /tmp/frontend.tar.gz

            # Deploy backend
            mkdir -p /opt/mycarecoach
            tar -xzf /tmp/backend.tar.gz -C /opt/mycarecoach
            cd /opt/mycarecoach
            npm ci --production --silent
            rm /tmp/backend.tar.gz

            # Reload app
            pm2 reload mycarecoach-api --update-env || pm2 start dist/index.js --name mycarecoach-api
            pm2 save

            echo "Deploy complete"
          DEPLOY

      - name: Health check
        run: |
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://mycarecoach.app)
          echo "Frontend: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Frontend not responding!"
            exit 1
          fi
          echo "Deployment successful — https://mycarecoach.app"
