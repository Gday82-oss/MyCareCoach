name: 🚀 MyCareCoach CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8'

jobs:
  # ============================================
  # JOB 1: Tests et Quality Check
  # ============================================
  test:
    name: 🧪 Tests & Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
          
      - name: Install dependencies (Client)
        working-directory: ./client
        run: pnpm install
        
      - name: Lint Client
        working-directory: ./client
        run: pnpm lint || echo "No lint script"
        
      - name: Type Check Client
        working-directory: ./client
        run: pnpm tsc --noEmit
        
      - name: Build Client
        working-directory: ./client
        run: pnpm build
        
      - name: Install dependencies (Server)
        working-directory: ./server
        run: pnpm install
        
      - name: Build Server
        working-directory: ./server
        run: pnpm build

  # ============================================
  # JOB 2: Tests E2E (Playwright)
  # ============================================
  e2e:
    name: 🎭 Tests E2E
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Install dependencies
        working-directory: ./client
        run: npm ci
        
      - name: Install Playwright
        working-directory: ./client
        run: npx playwright install --with-deps
        
      - name: Run Playwright tests
        working-directory: ./client
        run: npx playwright test || echo "No tests yet"
        
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 30

  # ============================================
  # JOB 3: Deploy Frontend (Vercel)
  # ============================================
  deploy-frontend:
    name: 📱 Deploy Frontend
    runs-on: ubuntu-latest
    needs: [test, e2e]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./client

  # ============================================
  # JOB 4: Deploy Backend (VPS Hostinger)
  # ============================================
  deploy-backend:
    name: 🔧 Deploy Backend
    runs-on: ubuntu-latest
    needs: [test, e2e]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}
          
      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -o StrictHostKeyChecking=no root@$VPS_HOST "
            cd /opt/mycarecoach && \
            git pull origin main && \
            cd server && \
            npm ci && \
            npm run build && \
            pm2 reload mycarecoach-api || pm2 start dist/index.js --name mycarecoach-api
          "

  # ============================================
  # JOB 5: Notification
  # ============================================
  notify:
    name: 📣 Notify
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: always()
    
    steps:
      - name: Notify success
        if: needs.deploy-frontend.result == 'success' && needs.deploy-backend.result == 'success'
        run: |
          echo "🎉 Deployment successful!"
          echo "Frontend: https://mycarecoach.app"
          echo "API: https://api.mycarecoach.app"
          
      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check logs for details."
